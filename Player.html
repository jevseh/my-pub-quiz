<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: #0b0e14; color: #fff; font-family: sans-serif; text-align: center; padding: 15px; margin: 0; }
        .hidden { display: none; }
        input, select, button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 10px; border: none; font-size: 1.1rem; box-sizing: border-box; }
        button { background: #6200ee; color: white; font-weight: bold; cursor: pointer; }
        .q-card { background: #1c2128; padding: 20px; border-radius: 15px; border: 2px solid #333; min-height: 280px; }
        .btn-box { background: #2d333b; padding: 18px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; border: 2px solid transparent; }
        .selected { border-color: #bb86fc; background: #352b45; }
        #math-ans, #let-ans { font-size: 3rem; text-align: center; background: #000; color: #00e676; width: 100%; border: none; }
        .media-box img { max-width: 100%; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="setup">
        <h2>Join Quiz</h2>
        <input type="text" id="r" placeholder="4-Digit Code">
        <input type="text" id="t" placeholder="Team Name">
        <select id="bz"><option value="https://actions.google.com/sounds/v1/alarms/air_horn.ogg">Air Horn</option></select>
        <button onclick="join()">JOIN</button>
    </div>
    <div id="game" class="hidden">
        <div id="q-area" class="q-card"></div>
        <button id="sub" onclick="send()">SUBMIT ANSWER</button>
    </div>
    <script>
        let ws, qType, curAns = "";
        async function join() {
            if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
            const r = document.getElementById('r').value, t = document.getElementById('t').value;
            // CONNECTING TO YOUR BRAIN
            ws = new WebSocket(`wss://my-pub-quiz.onrender.com/ws/${r}/player/${t}`);
            ws.onmessage = (e) => {
                const m = JSON.parse(e.data);
                if(m.type === "NEW_Q") render(m.q);
                if(m.type === "REV") document.getElementById('q-area').innerHTML = `<h1>ANSWER: ${m.ans}</h1>`;
            };
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
        }
        function render(q) {
            qType = q.type; curAns = "";
            let h = `<div class="media-box">`;
            if(q.med && q.med.includes('http')) h += `<img src="${q.med}">`;
            h += `</div><h3>${q.title}</h3>`;
            if(q.type === 'math') h += `<input type="number" id="math-ans" inputmode="numeric">`;
            if(q.type === 'letter') h += `<input type="text" id="let-ans" maxlength="1" placeholder="Type first letter..." autocapitalize="on">`;
            if(q.type === 'multi' || q.type === 'sequence') {
                q.choices.split('|').forEach((c, i) => {
                    const L = String.fromCharCode(65+i);
                    h += `<div class="btn-box" onclick="tap(this,'${L}')"><span>${L}: ${c}</span><b class="b"></b></div>`;
                });
            }
            document.getElementById('q-area').innerHTML = h;
            document.getElementById('sub').innerText = "SUBMIT ANSWER";
        }
        function tap(el, L) {
            if(qType === 'multi') { el.classList.toggle('selected'); curAns = Array.from(document.querySelectorAll('.selected')).map(e => e.innerText[0]).sort().join(''); }
            else if (qType === 'sequence') {
                if(curAns.includes(L)) { curAns = ""; document.querySelectorAll('.btn-box').forEach(b => { b.classList.remove('selected'); b.querySelector('.b').innerText = ""; }); return; }
                curAns += L; el.classList.add('selected'); el.querySelector('.b').innerText = curAns.length;
            }
        }
        function send() {
            let a = curAns;
            if(qType === 'math') a = document.getElementById('math-ans').value;
            if(qType === 'letter') a = document.getElementById('let-ans').value;
            ws.send(JSON.stringify({ans: a, buzzer: document.getElementById('bz').value}));
            document.getElementById('sub').innerText = "SENT!";
        }
    </script>
</body>
</html>
