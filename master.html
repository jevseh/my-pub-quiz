<!DOCTYPE html>
<html>
<head>
    <title>Quizmaster Hub</title>
    <style>
        body { background: #0b0e14; color: #adbac7; font-family: sans-serif; display: flex; margin: 0; height: 100vh; }
        .side { width: 320px; border-right: 1px solid #444; padding: 20px; background: #1c2128; overflow-y: auto; }
        .main { flex: 1; padding: 40px; text-align: center; }
        #timer { font-size: 8rem; color: #00e676; margin: 15px 0; }
        .haze { font-size: 0.8rem; background: #000; padding: 8px; border-radius: 4px; margin-top: 5px; text-align: left; border-left: 3px solid #ff4444; }
        button { padding: 15px; border-radius: 6px; font-size: 1rem; cursor: pointer; margin: 5px; color: white; font-weight: bold; width: 220px; border: none; }
    </style>
</head>
<body>
    <div class="side"><h3>Hazing Feed</h3><div id="teams"></div><hr>
    <input type="file" id="csv" style="display:none"><button style="background:#444" onclick="document.getElementById('csv').click()">📁 UPLOAD CSV</button></div>
    <div class="main"><h1 id="code">ROOM: ----</h1><div id="timer">30</div>
    <div style="background:#1c2128; padding:20px; border-radius:10px; margin-bottom: 20px;">Pts: <input type="number" id="pts" value="10" style="width:60px"> Pen: <input type="number" id="pen" value="0" style="width:60px"></div>
    <button style="background:#238636" onclick="start()">🚀 START CLOCK</button><br>
    <button style="background:#ff9800" onclick="rev()">👁️ REVEAL ANSWER</button><br>
    <button style="background:#58a6ff" onclick="next()">➡️ PREP NEXT Q</button></div>
    <audio id="aud"></audio>
    <script>
        let ws, room, tInt; const aud = document.getElementById('aud');
        async function init() {
            // ASKING BRAIN FOR A CODE
            const res = await fetch('https://my-pub-quiz.onrender.com/create-room');
            const data = await res.json(); 
            room = data.room_code; 
            document.getElementById('code').innerText = "ROOM: " + room;
            
            // CONNECTING LIVE PHONE CALL
            ws = new WebSocket(`wss://my-pub-quiz.onrender.com/ws/${room}/master/M`);
            
            ws.onmessage = (e) => { 
                const m = JSON.parse(e.data); 
                if(m.type === "BEEP") { aud.src = m.url; aud.play(); setTimeout(()=>aud.pause(), 2000); } 
                if(m.type === "UP") update(m.teams); 
            };
        }
        function update(ts) {
            let h = ""; for(let t in ts) { const last = ts[t].h[ts[t].h.length-1]; const haze = last ? `<div class="haze">${last.is_c?'✅':'❌'} ${t}: "${last.ans}"</div>` : ""; h += `<div><b>${t}</b>: ${ts[t].s} points ${haze}</div><br>`; }
            document.getElementById('teams').innerHTML = h;
        }
        function start() { let s = 30; clearInterval(tInt); document.getElementById('timer').style.color = "#00e676"; tInt = setInterval(() => { s--; document.getElementById('timer').innerText = s; if(s<=5) document.getElementById('timer').style.color = "red"; if(s<=0) clearInterval(tInt); }, 1000); ws.send(JSON.stringify({type: "START", pts: document.getElementById('pts').value, pen: document.getElementById('pen').value})); }
        function rev() { clearInterval(tInt); ws.send(JSON.stringify({type: "REVEAL"})); }
        function next() { ws.send(JSON.stringify({type: "NEXT"})); }
        document.getElementById('csv').onchange = (e) => {
            const r = new FileReader(); r.onload = (ev) => {
                const rows = ev.target.result.split('\n').slice(1);
                const pk = rows.map(line => {
                    const c = line.split(',');
                    let choiceList = [c[6], c[7], c[8], c[9], c[10], c[11]].map(i => i ? i.trim() : "").filter(i => i !== "");
                    return {title:c[0], type:c[1], correct:c[2], pts:c[3], pen:c[4], med:c[5], choices: choiceList.join('|')};
                });
                ws.send(JSON.stringify({type: "LOAD", payload: pk}));
                alert("Quiz Loaded!");
            }; r.readAsText(e.target.files[0]);
        }; init();
    </script>
</body>
</html>
